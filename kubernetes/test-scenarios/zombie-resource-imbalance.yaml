apiVersion: apps/v1
kind: Deployment
metadata:
  name: zombie-resource-imbalance
  namespace: test-scenarios
  labels:
    app: zombie-resource-imbalance
    scenario: zombie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zombie-resource-imbalance
  template:
    metadata:
      labels:
        app: zombie-resource-imbalance
        scenario: zombie
    spec:
      containers:
        - name: zombie-resource-imbalance
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Zombie pattern: huge resource allocation with near-zero usage
              # Simulates a container scaled up for a load test and never scaled down
              while true; do
                sleep 120
              done
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
