apiVersion: apps/v1
kind: Deployment
metadata:
  name: adversarial-cold-standby
  namespace: test-scenarios
  labels:
    app: adversarial-cold-standby
    scenario: adversarial
    expected: normal
    failure-mode: "potential-false-positive"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adversarial-cold-standby
  template:
    metadata:
      labels:
        app: adversarial-cold-standby
        scenario: adversarial
    spec:
      containers:
        - name: adversarial-cold-standby
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              # ADVERSARIAL: cold-standby failover service. Holds memory and
              # sends keepalive heartbeats every 30s but never processes real
              # work. Behaviourally indistinguishable from a zombie that retries
              # against a dead service. Heuristic rules 1+4 may both fire.
              dd if=/dev/zero of=/tmp/cache bs=1M count=80 2>/dev/null
              while true; do
                wget -q -T 2 -O /dev/null http://example.com 2>/dev/null || true
                sleep 30
              done
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
