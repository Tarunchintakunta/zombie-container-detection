apiVersion: apps/v1
kind: Deployment
metadata:
  name: adversarial-stealth-zombie
  namespace: test-scenarios
  labels:
    app: adversarial-stealth-zombie
    scenario: adversarial
    expected: zombie
    failure-mode: "false-negative"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adversarial-stealth-zombie
  template:
    metadata:
      labels:
        app: adversarial-stealth-zombie
        scenario: adversarial
    spec:
      containers:
        - name: adversarial-stealth-zombie
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              # ADVERSARIAL: a real zombie that has learned to evade Rule 1.
              # It does no useful work, but performs a heavy 5-second CPU
              # burst every 12 minutes purely to keep max_cpu_in_window > 15%
              # so Rule 1 thinks "active workload" -> excluded.
              # This is the worst case for the heuristic: a zombie that
              # mimics a low-duty-cycle batch job. Expected: FALSE NEGATIVE.
              # (A previous design used `while [ $(date +%s) -lt $end ]; do :;
              # done` which was too light to push max_cpu above 15%; replaced
              # with `yes > /dev/null` which fully saturates a CPU core.)
              while true; do
                yes > /dev/null &
                YES_PID=$!
                sleep 5
                kill $YES_PID 2>/dev/null
                wait $YES_PID 2>/dev/null
                sleep 720
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
