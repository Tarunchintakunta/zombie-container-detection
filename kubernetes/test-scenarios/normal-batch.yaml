apiVersion: apps/v1
kind: Deployment
metadata:
  name: normal-batch
  namespace: test-scenarios
  labels:
    app: normal-batch
    scenario: normal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: normal-batch
  template:
    metadata:
      labels:
        app: normal-batch
        scenario: normal
    spec:
      containers:
        - name: normal-batch
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                # Simulate batch job: heavy CPU every 10 minutes, idle between
                echo "Starting batch processing..."
                i=0
                while [ $i -lt 500000 ]; do
                  i=$((i+1))
                done
                echo "Batch complete, sleeping..."
                sleep 600
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
