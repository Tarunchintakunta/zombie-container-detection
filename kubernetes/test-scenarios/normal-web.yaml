apiVersion: apps/v1
kind: Deployment
metadata:
  name: normal-web
  namespace: test-scenarios
  labels:
    app: normal-web
    scenario: normal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: normal-web
  template:
    metadata:
      labels:
        app: normal-web
        scenario: normal
    spec:
      containers:
        - name: normal-web
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                # Simulate active web server: CPU work + network activity
                i=0
                while [ $i -lt 50000 ]; do
                  i=$((i+1))
                done
                # Network activity: download a small page
                wget -q -O /dev/null http://example.com 2>/dev/null || true
                sleep 2
                # Another burst of CPU work
                i=0
                while [ $i -lt 30000 ]; do
                  i=$((i+1))
                done
                sleep 1
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
