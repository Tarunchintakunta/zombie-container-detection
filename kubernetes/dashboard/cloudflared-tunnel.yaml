# Free HTTPS layer in front of the dashboard via Cloudflare quick-tunnel.
# No CF account, no domain, no inbound firewall change required. The pod
# initiates an outbound connection to Cloudflare and gets back a public
# https://*.trycloudflare.com URL printed in the pod logs.
#
# Apply:    kubectl apply -f kubernetes/dashboard/cloudflared-tunnel.yaml
# Get URL:  kubectl logs -n zombie-detector deployment/cloudflared | grep trycloudflare.com
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: zombie-detector
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.1
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - --url
            - http://zombie-dashboard.zombie-detector.svc.cluster.local
          ports:
            - containerPort: 2000
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
