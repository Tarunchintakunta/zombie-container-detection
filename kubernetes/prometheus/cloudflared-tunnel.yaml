# Public HTTPS access to Prometheus via Cloudflare quick-tunnel.
# Same pattern as kubernetes/dashboard/cloudflared-tunnel.yaml: a single pod
# initiates an outbound connection to Cloudflare and gets back a public
# https://*.trycloudflare.com URL printed in its logs.
#
# WARNING: Prometheus has no built-in authentication. Anyone with the URL
# can run arbitrary PromQL queries against this cluster's metrics. Use for
# demo / short-lived clusters only.
#
# Apply:    kubectl apply -f kubernetes/prometheus/cloudflared-tunnel.yaml
# Get URL:  kubectl logs -n monitoring deployment/cloudflared-prometheus | grep trycloudflare.com
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-prometheus
  namespace: monitoring
  labels:
    app: cloudflared-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-prometheus
  template:
    metadata:
      labels:
        app: cloudflared-prometheus
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.1
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - --url
            - http://prometheus-server.monitoring.svc.cluster.local:9090
          ports:
            - containerPort: 2000
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
