apiVersion: apps/v1
kind: Deployment
metadata:
  name: zombie-detector
  namespace: zombie-detector
  labels:
    app: zombie-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zombie-detector
  template:
    metadata:
      labels:
        app: zombie-detector
    spec:
      serviceAccountName: zombie-detector
      containers:
        - name: zombie-detector
          image: zombie-detector:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--prometheus-url=http://prometheus-server.monitoring.svc.cluster.local:9090"
            - "--duration=60"
            - "--threshold=70"
            - "--exclude-namespaces=kube-system,kube-public,kube-node-lease,monitoring,zombie-detector"
            - "--continuous"
            - "--interval=300"
            - "--details"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
